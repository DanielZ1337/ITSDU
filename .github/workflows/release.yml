name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build and publish ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macOS
            os: macos-latest
            script: release:mac
          - platform: Linux
            os: ubuntu-latest
            script: release:linux
          - platform: Windows
            os: windows-latest
            script: release:win

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --force

      - name: Build and publish
        run: npm run ${{ matrix.script }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          VITE_ITSLEARNING_STORE_KEY: ${{ secrets.VITE_ITSLEARNING_STORE_KEY }}
          VITE_ITSLEARNING_OAUTH_STATE: ${{ secrets.VITE_ITSLEARNING_OAUTH_STATE }}